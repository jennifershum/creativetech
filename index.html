<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jennifer Shum | Blueprints & Brushstrokes</title>
    <style>
        :root {
            --eng-blue: #0047AB;
            --art-matcha: #778664;
            --transition-speed: 1.2s;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #111;
            color: white;
            overflow-x: hidden;
        }

        /* Particles Canvas */
        #particle-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: 5;
            pointer-events: none;
        }

        /* Navigation Header */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 20px;
            z-index: 100;
            display: flex;
            justify-content: center;
            gap: 30px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
        }

        nav a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: 0.3s;
            opacity: 0.8;
        }

        nav a:hover { opacity: 1; color: var(--art-matcha); }

        /* Background Layers with SWIPE */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background-size: cover;
            background-position: center;
            transition: clip-path var(--transition-speed) cubic-bezier(0.77, 0, 0.175, 1);
        }

        #bg-engineering {
            background-image: url('blueprint.png');
            z-index: 1;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
        }

        #bg-creative {
            background-image: url('cafe.png');
            z-index: 2;
            clip-path: polygon(100% 0, 100% 0, 100% 100%, 100% 100%);
        }

        body.creative-mode #bg-creative {
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0% 100%);
        }

        /* Content Overlay */
        .content-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 20px;
            box-sizing: border-box;
        }

        h1 { font-size: clamp(2.5rem, 6vw, 4rem); margin: 0; text-shadow: 2px 2px 20px rgba(0,0,0,0.8); }
        h2 { font-size: 1.2rem; margin: 10px 0 40px; font-weight: 300; opacity: 0.9; }

        #project-list {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1200px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.95);
            color: #222;
            border-radius: 12px;
            width: 320px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            transition: 0.4s ease;
        }

        .card-img {
            width: 100%;
            height: 160px;
            background: #ddd;
            background-size: cover;
            background-position: center;
        }

        .card-text { padding: 20px; text-align: left; }
        .info-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; }
        .info-card p { font-size: 0.9rem; line-height: 1.4; color: #444; }

        /* Toggle Button & Arrow */
        .toggle-btn {
            margin-top: 50px;
            padding: 15px 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: 2px solid white;
            background: rgba(0,0,0,0.5);
            color: white;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
        }

        .toggle-btn svg {
            width: 20px; height: 20px;
            transition: transform 0.6s ease;
        }

        .toggle-btn:hover { background: white; color: black; }
        .toggle-btn:hover svg { transform: rotate(180deg); stroke: black; }

        footer {
            position: fixed; bottom: 20px; width: 100%; text-align: center;
            z-index: 100; font-size: 0.8rem; opacity: 0.6; pointer-events: none;
        }
    </style>
</head>
<body class="engineering-mode">

    <canvas id="particle-canvas"></canvas>

    <nav>
        <a href="https://drive.google.com/file/d/1FWShG_92thWwGZR368S00UzP3MY_5si-/view?usp=sharing" target="_blank">Resume</a>
        <a href="https://www.jascolors.com" target="_blank">Art Portfolio</a>
        <a href="https://jennifershum.github.io/creativetech/" target="_blank">Games</a>
    </nav>

    <div id="bg-engineering" class="bg-layer"></div>
    <div id="bg-creative" class="bg-layer"></div>

    <div class="content-container">
        <h1 id="main-title">Jennifer Shum | PhD</h1>
        <h2 id="sub-title">Mechanical Design & Robotics R&D</h2>
        <div id="project-list"></div>
        <button class="toggle-btn" onclick="toggleMode()">
            Switch Persona
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 21L21 4M4 21h5v-5"/></svg>
        </button>
    </div>

    <footer>Jennifer.Angela.Shum@gmail.com | © 2026</footer>

    <script>
        const modes = {
            engineering: {
                title: "Jennifer Shum | PhD",
                subtitle: "Mechanical Design & Robotics R&D",
				accent: "#D4AF37", // A classic Metallic Gold accent
				particleColor: "rgba(255, 215, 0, 0.6)", // Golden Amber particles
                projects: [
                    { name: "Harvard Microrobotics", img: "robot_thumb.jpg", desc: "Electroadhesive footpads and novel mechanisms for small-scale robots." },
                    { name: "NASA JPL & iRobot", img: "nasa_thumb.jpg", desc: "Mechanical fixtures for Perseverance rover and consumer robotics R&D." },
                    { name: "Avatar Arena & Apps", img: "arena_thumb.jpg", desc: "Award-winning interactive demo and Android games with 30k+ downloads." }
                ]
            },
            creative: {
                title: "Jas | Creative Designer",
                subtitle: "Digital Art & Experiential Design",
                accent: "#778664",
                particleColor: "rgba(150, 200, 100, 0.5)",
                projects: [
                    { name: "Reddit Collectibles", img: "reddit_thumb.jpg", desc: "Launched original avatar series for 2,400+ collectors; $75k+ revenue." },
                    { name: "Chubby Cattle & Web3", img: "cattle_thumb.jpg", desc: "Blockchain-integrated loyalty designs for 40+ restaurant locations." },
                    { name: "Freelance Branding", img: "art_thumb.jpg", desc: "Visual solutions for NASA JPL and self-published children's books." }
                ]
            }
        };

        let currentMode = 'engineering';

        function render() {
            const data = modes[currentMode];
            document.getElementById('main-title').innerText = data.title;
            document.getElementById('sub-title').innerText = data.subtitle;
            document.getElementById('project-list').innerHTML = data.projects.map(p => `
                <div class="info-card" style="border-bottom: 6px solid ${data.accent}">
                    <div class="card-img" style="background-image: url('${p.img}')"></div>
                    <div class="card-text">
                        <h3>${p.name}</h3>
                        <p>${p.desc}</p>
                    </div>
                </div>
            `).join('');
        }

        function toggleMode() {
            currentMode = (currentMode === 'engineering') ? 'creative' : 'engineering';
            document.body.className = currentMode + "-mode";
            setTimeout(render, 400);
        }

        // --- Particle System ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = modes[currentMode].particleColor;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 80; i++) particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', resize);
        resize();
        initParticles();
        animate();
        window.onload = render;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jennifer Shum | Blueprints & Brushstrokes</title>
    <style>
        :root {
            --eng-blue: #0047AB;
            --art-gold: #D4AF37;
            --transition-speed: 0.8s;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; z-index: 5; pointer-events: none; }

        nav {
            position: fixed; top: 0; width: 100%; padding: 20px; z-index: 100;
            display: flex; justify-content: center; gap: clamp(10px, 4vw, 30px);
            background: rgba(0,0,0,0.6); backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        nav a {
            color: white; text-decoration: none; font-size: 0.75rem; font-weight: bold;
            letter-spacing: 1.5px; text-transform: uppercase; transition: 0.3s; opacity: 0.7;
        }
        nav a:hover { opacity: 1; color: var(--art-gold); }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background-size: cover; background-position: center;
            transition: opacity var(--transition-speed) ease-in-out;
        }

        #bg-engineering { background-image: url('blueprint.png'); z-index: 1; opacity: 0; }
        #bg-creative { background-image: url('cafe.png'); z-index: 2; opacity: 1; }
        
        body.engineering-mode #bg-engineering { opacity: 1; z-index: 3; }
        body.engineering-mode #bg-creative { opacity: 0; }

        .content-container {
            position: relative; z-index: 10; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; padding: 140px 20px 80px; box-sizing: border-box;
        }

        .header-shield {
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(15px);
            padding: 30px 50px;
            border-radius: 24px;
            margin-bottom: 50px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            display: flex; flex-direction: column; align-items: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        h1 { font-size: clamp(1.8rem, 5vw, 3.2rem); margin: 0; letter-spacing: -1px; }
        h2 { font-size: 0.9rem; margin: 10px 0 25px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; opacity: 0.9; }

        .toggle-btn {
            padding: 14px 32px; font-size: 0.85rem; font-weight: 900;
            cursor: pointer; border: 2px solid white; background: rgba(255,255,255,0.1);
            color: white; border-radius: 50px; display: flex; align-items: center; gap: 12px; 
            transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1.5px;
        }
        .toggle-btn:hover { background: white; color: black; transform: scale(1.05); }

        #switch-icon { 
            width: 20px; height: 20px; 
            transition: transform 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: block;
        }

        #project-list { display: flex; gap: 25px; flex-wrap: wrap; justify-content: center; max-width: 1400px; }

        .info-card {
            background: rgba(255, 255, 255, 0.98); color: #111;
            border-radius: 16px; width: 310px; overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .info-card:hover { transform: translateY(-12px); }

        .card-img { width: 100%; height: 175px; background-size: cover; background-position: center; }
        .card-img.loading { background: #ddd; position: relative; overflow: hidden; }
        .card-img.loading::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: shimmer 1.5s infinite;
        }
        @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

        .card-text { padding: 22px; text-align: left; }
        .info-card h3 { margin: 0 0 10px 0; font-size: 1.1rem; font-weight: 800; }
        .info-card p { font-size: 0.85rem; line-height: 1.5; color: #444; margin: 0; }

        .ai-credit {
            margin-top: 60px; font-size: 0.75rem; color: rgba(255,255,255,0.6);
            background: rgba(0,0,0,0.4); padding: 8px 20px; border-radius: 20px;
            letter-spacing: 0.5px;
        }

        footer { padding: 40px 0 20px; width: 100%; text-align: center; font-size: 0.75rem; opacity: 0.5; }
    </style>
</head>

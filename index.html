<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jennifer Shum | Blueprints & Brushstrokes</title>
    <style>
        /* CSS STYLES */
        :root {
            --eng-blue: #0047AB;
            --art-matcha: #778664;
            --transition-speed: 1.2s;
        }

        body, html {
            margin: 0; padding: 0;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            background-color: #f0f0f0;
        }

        /* Background Layers */
        .bg-layer {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background-size: cover;
            background-position: center;
            transition: opacity var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Use your actual filenames here */
        #bg-engineering {
            background-image: url('blueprint.png');
            z-index: 1;
        }

        #bg-creative {
            background-image: url('cafe.png');
            opacity: 0;
            z-index: 2;
        }

        /* Content Overlay */
        .content-container {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background: rgba(0, 0, 0, 0.15);
            transition: background var(--transition-speed);
            padding: 20px;
        }

        h1 { font-size: 3rem; margin-bottom: 0.5rem; color: white; text-shadow: 2px 2px 15px rgba(0,0,0,0.5); }
        h2 { font-size: 1.5rem; margin-bottom: 2rem; color: rgba(255,255,255,0.9); font-weight: 300; }

        /* Project Cards */
        #project-list {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 1000px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            padding: 25px;
            border-radius: 12px;
            width: 280px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            text-align: left;
        }

        .info-card:hover { transform: translateY(-5px); }
        .info-card h3 { margin-top: 0; font-size: 1.2rem; }
        .info-card p { font-size: 0.9rem; line-height: 1.4; color: #555; }

        /* Toggle Button */
        .toggle-btn {
            margin-top: 40px;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border: 3px solid white;
            background: transparent;
            color: white;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .toggle-btn:hover {
            background: white;
            color: #333;
            box-shadow: 0 0 20px rgba(255,255,255,0.4);
        }

        /* State Classes */
        body.creative-mode #bg-creative { opacity: 1; }
        body.creative-mode .content-container { background: rgba(0,0,0,0.05); }

        footer {
            position: fixed;
            bottom: 20px;
            color: white;
            z-index: 100;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
